name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Linux binaries link Xlib (config UI + cursor tracking), XFixes
      # (cursor hide/show) and Xi (XInput2 capture). libXtst is loaded at
      # runtime via dlopen, so it needs no -dev package to build.
      - name: Install X libraries
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxfixes-dev libxi-dev

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          # Track Zig master. The codebase uses in-development std.Io APIs (no
          # tagged release has them), and specific nightly builds are pruned from
          # ziglang.org/builds and the mirrors after a while, so a pinned
          # dev version eventually 404s everywhere. Master is always fetchable;
          # the trade-off is a breaking change in Zig can turn CI red until the
          # code catches up.
          version: master

      - name: Build (native)
        run: zig build

      - name: Cross-compile (Windows)
        run: zig build -Dtarget=x86_64-windows

      - name: Test
        run: zig build test
